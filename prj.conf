# Blynk MQTT
# CONFIG_BLYNK_SERVER="fra1.blynk.cloud"
# CONFIG_BLYNK_AUTH_TOKEN="<yourToken>"
CONFIG_BLYNK_SERVER="lon1.blynk.cloud"
CONFIG_BLYNK_AUTH_TOKEN="x4_SIJkM9WDh-dBq94fCX6f_fzKZRYkc"
CONFIG_BLYNK_TEMPLATE_ID="TMPL5YluS7bTY"
# CONFIG_CLOUD_PUBLISH_PATH="/external/api/update?token=x4_SIJkM9WDh-dBq94fCX6f_fzKZRYkc&V1=42"

# How long between sends, in minutes
CONFIG_DEFAULT_DELAY=1

# Enable this to see modem AT commands for debugging
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_INF=y

# Heap and stacks – increased for MQTT + FOTA
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# New Libc
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Network
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_POSIX_API=y
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y

# LTE link control
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y


# Modem library
CONFIG_NRF_MODEM_LIB=y
CONFIG_NRF_MODEM_LIB_TRACE=n
CONFIG_MODEM_KEY_MGMT=y

# Date Time library
CONFIG_DATE_TIME=y

# Reboot support (used by FOTA callback)
CONFIG_REBOOT=y

# Logging
CONFIG_LOG=y
# CONFIG_LOG_MODE_IMMEDIATE=y

# cJSON
CONFIG_CJSON_LIB=y

# MQTT (replaces HTTP)
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=30

# FOTA / OTA over MQTT
CONFIG_FOTA_DOWNLOAD=y
CONFIG_FOTA_DOWNLOAD_PROGRESS_EVT=y
CONFIG_DFU_TARGET=y
CONFIG_DFU_TARGET_MCUBOOT=y

CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_IMG_MANAGER=y

CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_DOWNLOADER=y
CONFIG_DOWNLOADER_MAX_HOSTNAME_SIZE=64
CONFIG_DOWNLOADER_MAX_FILENAME_SIZE=192

# Flash required for FLASH_MAP -> MCUBOOT_IMG_MANAGER
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
# NS flash driver doesn't expose page layout; disable the inspect check
CONFIG_STREAM_FLASH_INSPECT=n
